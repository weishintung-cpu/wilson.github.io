<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 終極畫板</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #333; position: fixed;
        }
        /* 控制區：強制固定高度 */
        #ui { 
            height: 120px; background: #fff; padding: 10px; 
            display: flex; flex-direction: column; gap: 8px;
            border-bottom: 2px solid #000;
        }
        .colors { display: flex; flex-wrap: wrap; gap: 6px; }
        .c-btn { 
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ccc;
        }
        /* 畫布區：強制填滿剩餘空間 */
        #canvas-box { 
            position: absolute; top: 120px; bottom: 0; left: 0; right: 0; 
            background: #fff; 
        }
        canvas { display: block; background: #fff; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">
    <div class="colors">
        <div class="c-btn" style="background:#000" onclick="sColor('#000')"></div>
        <div class="c-btn" style="background:#f00" onclick="sColor('#f00')"></div>
        <div class="c-btn" style="background:#0f0" onclick="sColor('#0f0')"></div>
        <div class="c-btn" style="background:#00f" onclick="sColor('#00f')"></div>
        <div class="c-btn" style="background:#ff0" onclick="sColor('#ff0')"></div>
        <div class="c-btn" style="background:#f0f" onclick="sColor('#f0f')"></div>
        <div class="c-btn" style="background:#0ff" onclick="sColor('#0ff')"></div>
        <div class="c-btn" style="background:#888" onclick="sColor('#888')"></div>
        <div class="c-btn" style="background:#f90" onclick="sColor('#f90')"></div>
        <div class="c-btn" style="background:#933" onclick="sColor('#933')"></div>
        <div class="c-btn" style="background:#609" onclick="sColor('#609')"></div>
        <div class="c-btn" style="background:#ddd; border:1px dashed #999;" onclick="sColor('#fff')"></div>
        <button onclick="location.reload()" style="margin-left:auto;">重整</button>
        <button onclick="clr()" style="background:#f00; color:#fff; border:none; border-radius:4px;">清空</button>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        粗細: <input type="range" id="sz" min="1" max="50" value="5" oninput="sSize(this.value)" style="flex:1">
        <span id="szNum">5</span>
    </div>
</div>

<div id="canvas-box">
    <canvas id="c"></canvas>
</div>

<script>
    const cvs = document.getElementById('c');
    const ctx = cvs.getContext('2d');
    const box = document.getElementById('canvas-box');
    let drawing = false;

    // 1. 強制設定大小 (不依賴 onload)
    function fit() {
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight - 120;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = document.getElementById('sz').value;
        ctx.strokeStyle = '#000';
    }
    fit();

    // 2. 繪圖核心邏輯
    function getP(e) {
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX, y: t.clientY - 120 };
    }

    function start(e) {
        drawing = true;
        const p = getP(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        if(e.cancelable) e.preventDefault();
    }

    function move(e) {
        if(!drawing) return;
        const p = getP(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        if(e.cancelable) e.preventDefault();
    }

    function stop() { drawing = false; }

    // 3. 綁定事件 (直接在 script 內綁定，確保相容)
    cvs.addEventListener('touchstart', start, {passive:false});
    cvs.addEventListener('touchmove', move, {passive:false});
    cvs.addEventListener('touchend', stop);
    
    cvs.addEventListener('mousedown', start);
    cvs.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);

    // 4. UI 功能
    function sColor(c) { ctx.strokeStyle = c; }
    function sSize(v) { 
        ctx.lineWidth = v; 
        document.getElementById('szNum').innerText = v;
    }
    function clr() { if(confirm('要清空嗎?')) ctx.clearRect(0,0,cvs.width,cvs.height); }

    // 5. 額外補丁：針對 iOS 轉向
    window.addEventListener('resize', fit);
    // 預防萬一，0.5秒後再次強制校正大小
    setTimeout(fit, 500);
</script>

</body>
</html>
